<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanish</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 440px;
      min-height: 260px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #08080c;
      color: #f5f5f7;
      padding: 32px;
      overflow: hidden;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.5));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .version {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.02em;
    }

    /* ─── Glass card ─── */
    .card {
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.04) 0%,
        rgba(255,255,255,0.015) 100%
      );
      border: 0.5px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 16px 18px;
      margin-bottom: 12px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:
        0 2px 8px rgba(0,0,0,0.3),
        inset 0 0.5px 0 rgba(255,255,255,0.06);
    }

    /* ─── Status ─── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34,197,94,0.5);
    }
    .status-dot.disconnected { background: rgba(255,255,255,0.12); }
    .status-text { font-size: 15px; color: rgba(255,255,255,0.35); font-weight: 400; }
    .status-email { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.6); }

    /* ─── Buttons ─── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 15px 18px;
      border: none;
      border-radius: 16px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      gap: 8px;
      letter-spacing: -0.01em;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, rgba(124,106,239,0.85), rgba(168,120,255,0.75));
      color: white;
      border: 0.5px solid rgba(255,255,255,0.12);
      box-shadow:
        0 4px 16px rgba(124,106,239,0.2),
        inset 0 0.5px 0 rgba(255,255,255,0.15);
    }
    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 4px 24px rgba(124,106,239,0.35),
                  inset 0 0.5px 0 rgba(255,255,255,0.2);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.4);
      border: 0.5px solid rgba(255,255,255,0.05);
      margin-top: 8px;
    }
    .btn-secondary:hover:not(:disabled) {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
    }

    .btn-danger {
      background: rgba(239,68,68,0.06);
      color: rgba(239,68,68,0.5);
      border: 0.5px solid rgba(239,68,68,0.08);
      margin-top: 8px;
      font-weight: 500;
    }
    .btn-danger:hover:not(:disabled) {
      background: rgba(239,68,68,0.1);
      color: rgba(239,68,68,0.7);
    }

    /* ─── Stats ─── */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: rgba(255,255,255,0.02);
      border: 0.5px solid rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 14px 12px;
      text-align: center;
      box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.03);
    }
    .stat-num {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .stat-label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.25);
      margin-top: 6px;
      letter-spacing: 0.02em;
    }

    /* ─── Scan progress ─── */
    .scan-status {
      text-align: center;
      padding: 20px 0 8px;
    }
    .scan-status .scan-title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      margin-bottom: 6px;
    }
    .scan-status .scan-detail {
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      min-height: 18px;
    }

    .progress-bar {
      height: 3px;
      border-radius: 3px;
      background: rgba(255,255,255,0.04);
      overflow: hidden;
      margin: 14px 0;
    }
    .progress-bar .fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, rgba(124,106,239,0.8), rgba(168,120,255,0.8));
      animation: shimmer 1.5s ease-in-out infinite alternate;
      width: 40%;
    }
    @keyframes shimmer {
      0% { transform: translateX(-50%); opacity: 0.6; }
      100% { transform: translateX(200%); opacity: 1; }
    }

    .description {
      font-size: 13px;
      color: rgba(255,255,255,0.25);
      line-height: 1.6;
      margin-bottom: 18px;
      letter-spacing: -0.01em;
    }

    .hidden { display: none !important; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .btn-group .btn {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">Vanish</span>
    <span class="version" id="version"></span>
  </div>

  <!-- Not connected -->
  <div id="view-connect">
    <div class="card">
      <div class="status-row">
        <div class="status-dot disconnected"></div>
        <span class="status-text">Not connected</span>
      </div>
    </div>
    <p class="description">
      Connect your Gmail to discover every account and subscription linked to your email.
    </p>
    <button class="btn btn-primary" id="btn-connect">Connect Gmail</button>
  </div>

  <!-- Connected -->
  <div id="view-connected" class="hidden">
    <div class="card">
      <div class="status-row">
        <div class="status-dot connected"></div>
        <span class="status-email" id="connected-email"></span>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-num" style="color: #7c6aef;" id="stat-accounts">--</div>
        <div class="stat-label">Accounts</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color: #22c55e;" id="stat-subscriptions">--</div>
        <div class="stat-label">Subscriptions</div>
      </div>
    </div>

    <!-- Scan progress (shown inline when scanning) -->
    <div id="scan-inline" class="hidden">
      <div class="progress-bar"><div class="fill"></div></div>
      <div class="scan-status">
        <div class="scan-title">Scanning inbox...</div>
        <div class="scan-detail" id="scan-progress">Starting...</div>
      </div>
    </div>

    <button class="btn btn-primary" id="btn-scan">Scan Inbox</button>
    <button class="btn btn-secondary" id="btn-open-dashboard">Open Dashboard</button>
    <button class="btn btn-danger" id="btn-disconnect">Disconnect</button>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
