<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #0a0a0c;
      color: #f5f5f7;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .logo { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
    .version { font-size: 11px; color: rgba(255,255,255,0.15); }

    .card {
      background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border: 0.5px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .status-dot.connected { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.4); }
    .status-dot.disconnected { background: rgba(255,255,255,0.15); }
    .status-text { font-size: 13px; color: rgba(255,255,255,0.5); }
    .status-email { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.7); }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(135deg, rgba(124,106,239,0.9), rgba(192,132,252,0.8));
      color: white;
      border: 0.5px solid rgba(255,255,255,0.15);
      box-shadow: 0 0 16px rgba(124,106,239,0.2);
    }
    .btn-primary:hover { box-shadow: 0 0 24px rgba(124,106,239,0.35); }

    .btn-secondary {
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.5);
      border: 0.5px solid rgba(255,255,255,0.06);
      margin-top: 8px;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); }

    .btn-danger {
      background: rgba(239,68,68,0.08);
      color: rgba(239,68,68,0.6);
      border: 0.5px solid rgba(239,68,68,0.1);
      margin-top: 8px;
    }
    .btn-danger:hover { background: rgba(239,68,68,0.12); color: rgba(239,68,68,0.8); }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-card {
      background: rgba(255,255,255,0.02);
      border: 0.5px solid rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    .stat-num {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
    }
    .stat-label { font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 2px; }

    .progress-text {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      text-align: center;
      padding: 8px;
      min-height: 32px;
    }

    .label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
      margin-bottom: 8px;
    }

    .hidden { display: none; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">Vanish</span>
    <span class="version" id="version"></span>
  </div>

  <!-- Not connected -->
  <div id="view-connect">
    <div class="card">
      <div class="status-row">
        <div class="status-dot disconnected"></div>
        <span class="status-text">Not connected</span>
      </div>
    </div>
    <p style="font-size: 13px; color: rgba(255,255,255,0.3); line-height: 1.6; margin-bottom: 16px;">
      Connect your Gmail to discover every account and subscription linked to your email.
    </p>
    <button class="btn btn-primary" id="btn-connect">Connect Gmail</button>
  </div>

  <!-- Connected -->
  <div id="view-connected" class="hidden">
    <div class="card">
      <div class="status-row">
        <div class="status-dot connected"></div>
        <span class="status-email" id="connected-email"></span>
      </div>
    </div>

    <div class="stats" id="stats-grid">
      <div class="stat-card">
        <div class="stat-num" style="color: #3b82f6;" id="stat-accounts">--</div>
        <div class="stat-label">Accounts</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color: #22c55e;" id="stat-subscriptions">--</div>
        <div class="stat-label">Subscriptions</div>
      </div>
    </div>

    <div class="progress-text hidden" id="progress"></div>

    <button class="btn btn-primary" id="btn-scan">
      Scan Inbox
    </button>
    <button class="btn btn-secondary" id="btn-open-dashboard">
      Open Dashboard
    </button>
    <button class="btn btn-danger" id="btn-disconnect">
      Disconnect
    </button>
  </div>

  <!-- Scanning -->
  <div id="view-scanning" class="hidden">
    <div class="card" style="text-align: center; padding: 24px;">
      <div class="spinner" style="width: 24px; height: 24px; margin: 0 auto 12px;"></div>
      <p style="font-size: 14px; font-weight: 500;">Scanning inbox...</p>
      <p class="progress-text" id="scan-progress" style="padding: 4px;">Starting...</p>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
